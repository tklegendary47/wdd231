<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Apply | TalentTrack</title>
  <meta name="description" content="Apply for jobs easily using TalentTrack. Submit your application details securely.">
  <meta name="author" content="Takudzwa P. Matimura">

  <meta property="og:title" content="Apply for Jobs - TalentTrack">
  <meta property="og:description" content="Submit your job application quickly and easily.">
  <meta property="og:type" content="website">

  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles/styles.css">
  <script src="scripts/main.js"></script>
</head>

<body>

<header>

  <div class="logo">TalentTrack</div>

  <button id="menu-btn" aria-label="Toggle Navigation">☰</button>

  <nav id="nav-menu">
    <a href="index.html">Home</a>
    <a href="jobs.html">Jobs</a>
    <a href="apply.html" class="active">Apply</a>
  </nav>
</header>

<main>

  <section class="page-header">
    <h1>Job Application</h1>
    <p>Fill in your details to apply.</p>
  </section>

  <section class="form-section">
    <form action="results.html" method="get">

      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="position">Position Applying For</label>
      <input type="text" id="position" name="position" required>

      <label for="experience">Experience Level</label>
      <select id="experience" name="experience" required>
        <option value="">Select one</option>
        <option value="Junior">Junior</option>
        <option value="Mid">Mid</option>
        <option value="Senior">Senior</option>
      </select>

      <label for="message">Why should we hire you?</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="btn">Submit Application</button>

    </form>
  </section>

</main>

<footer>
  <p>&copy; 2026 TalentTrack</p>
  <nav>
    <a href="attributions.html">Attributions</a>
    <a href="#">Video Demo</a>
  </nav>
</footer>
<script>
  const params = new URLSearchParams(window.location.search);
  const position = params.get("position");

  if (position) {
    document.getElementById("position").value = position;
  }
</script>
</body>
</html>
