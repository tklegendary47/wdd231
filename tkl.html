<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentTrack - Smart Job Board</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet"><style>
:root{
--primary:#2563EB;
--secondary:#F1F5F9;
--accent:#10B981;
--text:#1f2937;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--secondary);color:var(--text)}

header{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:#fff;position:sticky;top:0;z-index:1000}
nav a{margin-left:1rem;text-decoration:none;color:#333;font-weight:500}

.hero{padding:4rem 2rem;text-align:center;background:linear-gradient(135deg,#2563EB,#1e40af);color:white}
.hero input{margin-top:1rem;padding:.8rem;width:300px;border:none;border-radius:8px}

.container{padding:2rem}

.filters{display:flex;gap:1rem;margin-bottom:1rem}
select,input{padding:.5rem;border-radius:6px;border:1px solid #ccc}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem}

.card{background:white;padding:1.2rem;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.05);transition:.3s;cursor:pointer;position:relative}
.card:hover{transform:translateY(-6px)}

.save-btn{position:absolute;top:10px;right:10px;background:var(--accent);color:white;border:none;border-radius:6px;padding:.3rem .6rem;font-size:.8rem}

.badge{display:inline-block;background:var(--primary);color:white;padding:.2rem .6rem;border-radius:6px;font-size:.75rem;margin-top:.5rem}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal-content{background:white;padding:2rem;border-radius:12px;width:90%;max-width:500px;animation:fade .3s}

@keyframes fade{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.empty{text-align:center;margin-top:2rem;color:#777}

footer{text-align:center;padding:2rem;font-size:.9rem}
</style></head>
<body><header>
<h1>TalentTrack</h1>
<nav>
<a href="#">Home</a>
<a href="#jobs">Jobs</a>
</nav>
</header><section class="hero">
<h2>Find Your Dream Job</h2>
<p>Search smarter. Apply faster.</p>
<input id="search" placeholder="Search jobs...">
</section><div class="container" id="jobs"><div class="filters">
<select id="typeFilter">
<option value="">All Types</option>
<option>Full-time</option>
<option>Remote</option>
<option>Contract</option>
</select><input id="locationFilter" placeholder="Location">
</div><div class="grid" id="jobsContainer"></div>
<div class="empty" id="emptyState" style="display:none">No jobs found.</div></div><div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div><footer>© 2026 TalentTrack</footer><script>
const jobs=[
{title:"Frontend Developer",company:"Google",location:"Remote",type:"Full-time",desc:"Build modern UI systems."},
{title:"Backend Engineer",company:"Amazon",location:"USA",type:"Full-time",desc:"Work with APIs and databases."},
{title:"UI Designer",company:"Spotify",location:"Remote",type:"Contract",desc:"Design user interfaces."},
{title:"Full Stack Dev",company:"Netflix",location:"Canada",type:"Full-time",desc:"Work across stack."},
{title:"DevOps Engineer",company:"Microsoft",location:"UK",type:"Remote",desc:"Cloud systems."},
{title:"Mobile Developer",company:"Uber",location:"USA",type:"Full-time",desc:"Build mobile apps."},
{title:"QA Tester",company:"Facebook",location:"Remote",type:"Contract",desc:"Test applications."},
{title:"Data Analyst",company:"Airbnb",location:"USA",type:"Full-time",desc:"Analyze data."},
{title:"Security Engineer",company:"Apple",location:"USA",type:"Full-time",desc:"Cybersecurity."},
{title:"AI Engineer",company:"OpenAI",location:"Remote",type:"Full-time",desc:"Build AI models."},
{title:"Web Designer",company:"Figma",location:"Remote",type:"Contract",desc:"Design websites."},
{title:"Cloud Engineer",company:"IBM",location:"Germany",type:"Full-time",desc:"Cloud systems."},
{title:"Game Developer",company:"Unity",location:"USA",type:"Full-time",desc:"Game dev."},
{title:"Support Engineer",company:"Slack",location:"Remote",type:"Full-time",desc:"Customer support."},
{title:"Product Manager",company:"Tesla",location:"USA",type:"Full-time",desc:"Manage product."}
];

const container=document.getElementById('jobsContainer');
const search=document.getElementById('search');
const typeFilter=document.getElementById('typeFilter');
const locationFilter=document.getElementById('locationFilter');
const modal=document.getElementById('modal');
const modalContent=document.getElementById('modalContent');
const empty=document.getElementById('emptyState');

function getSaved(){return JSON.parse(localStorage.getItem('saved'))||[]}
function saveJob(job){
let saved=getSaved();
if(!saved.find(j=>j.title===job.title)){
saved.push(job);
localStorage.setItem('saved',JSON.stringify(saved));
}
render();
}

function render(){
const filtered=jobs.filter(job=>{
return (
job.title.toLowerCase().includes(search.value.toLowerCase()) &&
(typeFilter.value===""||job.type===typeFilter.value) &&
job.location.toLowerCase().includes(locationFilter.value.toLowerCase())
);
});

container.innerHTML="";

if(filtered.length===0){empty.style.display='block'}
else{empty.style.display='none'}

filtered.forEach(job=>{
const saved=getSaved().some(j=>j.title===job.title);

const card=document.createElement('div');
card.className='card';
card.innerHTML=`
<button class="save-btn">${saved?'Saved':'Save'}</button>
<h3>${job.title}</h3>
<p>${job.company}</p>
<p>${job.location}</p>
<span class="badge">${job.type}</span>
`;

card.onclick=()=>openModal(job);
card.querySelector('.save-btn').onclick=(e)=>{
e.stopPropagation();
saveJob(job);
};

container.appendChild(card);
});
}

function openModal(job){
modal.style.display='flex';
modalContent.innerHTML=`
<h2>${job.title}</h2>
<p><strong>${job.company}</strong></p>
<p>${job.location}</p>
<p>${job.desc}</p>
<button onclick="closeModal()">Apply</button>
`;
}

function closeModal(){modal.style.display='none'}
modal.onclick=(e)=>{if(e.target===modal)closeModal()}

search.oninput=render;
typeFilter.onchange=render;
locationFilter.oninput=render;

render();
</script></body>
</html>
